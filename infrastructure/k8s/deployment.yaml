apiVersion: v1
kind: Namespace
metadata:
  name: zentropay

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zentropay-config
  namespace: zentropay
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "zentropay"
  NODE_ENV: "production"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: zentropay-secrets
  namespace: zentropay
type: Opaque
stringData:
  DB_USER: postgres
  DB_PASS: ${DB_PASS}
  JWT_SECRET: ${JWT_SECRET}
  STRIPE_SECRET: ${STRIPE_SECRET}
  FLUTTERWAVE_SECRET: ${FLUTTERWAVE_SECRET}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentropay-backend
  namespace: zentropay
  labels:
    app: zentropay-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: zentropay-backend
  template:
    metadata:
      labels:
        app: zentropay-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/ransomfellacuti-commits/-ZentroPay-Full-Stack-Scaffold-:latest-backend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: zentropay-config
        - secretRef:
            name: zentropay-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: zentropay-backend
  namespace: zentropay
  labels:
    app: zentropay-backend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: zentropay-backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zentropay-backend-hpa
  namespace: zentropay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zentropay-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentropay-frontend
  namespace: zentropay
  labels:
    app: zentropay-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zentropay-frontend
  template:
    metadata:
      labels:
        app: zentropay-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/ransomfellacuti-commits/-ZentroPay-Full-Stack-Scaffold-:latest-frontend
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: REACT_APP_API_URL
          value: "https://api.zentropay.com"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: zentropay-frontend
  namespace: zentropay
  labels:
    app: zentropay-frontend
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: zentropay-frontend

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zentropay-ingress
  namespace: zentropay
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.zentropay.com
    - zentropay.com
    secretName: zentropay-tls
  rules:
  - host: api.zentropay.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zentropay-backend
            port:
              number: 3000
  - host: zentropay.com
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: zentropay-frontend
            port:
              number: 3000
